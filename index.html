<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>今天吃什么？</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6396683820631211"
     crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .header h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
            margin-bottom: 8px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .recipe-card {
            background: #fff;
            border-radius: 24px;
            padding: 30px 25px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .recipe-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%);
        }

        .recipe-icon {
            font-size: 60px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .recipe-name {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .recipe-category {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .recipe-desc {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .rolling .recipe-name {
            animation: rollingText 0.1s linear infinite;
        }

        @keyframes rollingText {
            0% {
                opacity: 0.5;
                transform: scale(0.95);
            }

            50% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0.5;
                transform: scale(0.95);
            }
        }

        .btn-container {
            margin-top: 30px;
            width: 100%;
            max-width: 380px;
        }

        .random-btn {
            width: 100%;
            padding: 18px 30px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .random-btn:active {
            transform: scale(0.96);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .random-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .random-btn:active::after {
            width: 300px;
            height: 300px;
        }

        .filter-section {
            margin-top: 25px;
            width: 100%;
            max-width: 380px;
        }

        .filter-title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            margin-bottom: 12px;
            text-align: center;
        }

        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .filter-tag {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .filter-tag.active {
            background: #fff;
            color: #764ba2;
            font-weight: 500;
        }

        .recipe-list-btn {
            margin-top: 20px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .recipe-list-btn:active {
            background: rgba(255, 255, 255, 0.25);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 420px;
            max-height: 70vh;
            border-radius: 24px 24px 0 0;
            padding: 25px;
            animation: slideUp 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f5f5f5;
            border: none;
            font-size: 20px;
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .recipe-item {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .recipe-item:active {
            transform: scale(0.95);
            background: #e9ecef;
        }

        .recipe-item-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .recipe-item-name {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }

        .recipe-item-category {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            pointer-events: none;
            animation: confetti-fall 3s ease-out forwards;
        }

        @keyframes confetti-fall {
            0% {
                opacity: 1;
                transform: translateY(-100px) rotate(0deg);
            }

            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg);
            }
        }

        .history-section {
            margin-top: 20px;
            width: 100%;
            max-width: 380px;
        }

        .history-title {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            margin-bottom: 10px;
            text-align: center;
        }

        .history-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .history-tag {
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
        }

    </style>
</head>

<body>
    <div class="header">
        <h1>🥣 今天吃什么？</h1>
        <p>不知道吃什么？让命运来决定吧！</p>
    </div>

    <div class="recipe-card" id="recipeCard">
        <div class="recipe-icon" id="recipeIcon">🎲</div>
        <div class="recipe-name" id="recipeName">点击按钮开始</div>
        <div class="recipe-category" id="recipeCategory" style="display: none;">准备中</div>
        <div class="recipe-desc" id="recipeDesc">点击下方按钮，随机抽取今日菜谱</div>
    </div>

    <div class="btn-container">
        <button class="random-btn" id="randomBtn" onclick="startRandom()">🎲 随机选菜</button>
    </div>

    <div class="filter-section">
        <div class="filter-title">选择分类</div>
        <div class="filter-tags">
            <span class="filter-tag active" data-category="all">全部</span>
            <span class="filter-tag" data-category="粗粮">粗粮</span>
            <span class="filter-tag" data-category="养元粥">养元粥</span>
            <span class="filter-tag" data-category="复元汤">复元汤</span>
            <span class="filter-tag" data-category="元气饮">元气饮</span>
            <span class="filter-tag" data-category="小炒素菜">小炒素菜</span>
            <span class="filter-tag" data-category="小炒荤菜">小炒荤菜</span>
            <span class="filter-tag" data-category="蒸菜">蒸菜</span>
            <span class="filter-tag" data-category="面食">面食</span>
        </div>
    </div>

    <button class="recipe-list-btn" onclick="showRecipeList()">📋 查看所有菜谱</button>

    <!-- <div class="history-section" id="historySection" style="display: none;">
        <div class="history-title">最近选中</div>
        <div class="history-tags" id="historyTags"></div>
    </div> -->

    <div class="modal" id="recipeModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">📋 月子餐菜单</div>
                <button class="modal-close" onclick="closeRecipeList()">×</button>
            </div>
            <div class="recipe-grid" id="recipeGrid"></div>
        </div>
    </div>

    <script>
        const menuMeta = {
            '粗粮': { icon: '🍚', desc: '主食粗粮，补充能量，搭配正餐更均衡' },
            '养元粥': { icon: '🥣', desc: '清淡软糯，暖胃易消化' },
            '复元汤': { icon: '🍲', desc: '温润滋补，适合月子期调养' },
            '元气饮': { icon: '🍵', desc: '日常饮水搭配，清爽温和' },
            '小炒素菜': { icon: '🥬', desc: '清爽少油，补充膳食纤维' },
            '小炒荤菜': { icon: '🥩', desc: '优质蛋白搭配家常做法' },
            '蒸菜': { icon: '♨️', desc: '清蒸少油，保留食材本味' },
            '面食': { icon: '🍜', desc: '主食多样，方便自由搭配' }
        };

        const menuGroups = {
            '粗粮': '红薯|紫薯|山药|玉米|馄饨|蒸饺|馒头|花卷|红薯饭|糙米饭|黑米饭|红豆米饭|杂粮饭|二米饭|薏仁饭|紫米饭|白米饭|八宝饭'.split('|'),

            '养元粥': '八宝粥|玉米蔬菜粥|南瓜小米粥|山药紫薯粥|桂圆红枣粥|黑米花生粥|薏仁红豆粥|红薯二米粥|糯米桂圆粥|银耳莲子粥|藜麦红枣粥|红糖糯米粥|红枣燕麦粥|黑米红薯粥|什锦蔬菜粥|什锦虾仁粥|香菇鸡丝粥|青菜鸡肉沫粥|黑芝麻燕麦粥|胡萝卜牛肉粥|番茄鳕鱼粥|山药鸡肉片粥|鸡肉燕麦粥|生菜牛肉粥|鱼片生菜粥|南瓜鳕鱼粥|番茄牛肉蔬菜粥|玉米南瓜滑鸡粥|小米红枣百合粥|南瓜燕麦牛奶粥|红豆花生二米粥|银耳雪梨红枣粥'.split('|'),
            
            '复元汤': '莲藕海带汤|黄豆芽豆腐汤|海带豆腐汤|茭白香菇汤|莴笋丝瓜汤|干贝冬瓜汤|丝瓜菌菇汤|番茄金针菇汤|海带冬瓜汤|三丝豆苗汤|鱼头豆腐汤|鲫鱼丝瓜汤|乌鸡红枣汤|通草鲫鱼汤|银耳雪梨羹|木瓜西米露|红豆百合莲子汤|南瓜糯米丸子|木瓜红枣花生汤|桂圆红枣汤|木瓜牛奶汤|黑谷物甜羹|五红汤'.split('|'),

            '元气饮': '黑豆水|五红汤|黑豆杜仲水|陈皮炒米水|红糖鸡蛋水|红枣枸杞水|黄芪杜仲茶|玫瑰干菊枣茶|党参黄芪炒米水|通草桂圆枸杞水|苹果无花果水'.split('|'),

            '小炒素菜': '清炒冬瓜|清炒生菜|蚝油生菜|清炒菠菜|清炒莴苣|清炒茭白|清炒南瓜片|素炒藕片|蒜蓉菜心|素炒三丝|地三鲜|香菇油菜|洋葱土豆片|醋溜土豆丝|醋溜娃娃菜|白灼芥兰|茄汁花菜|芹菜炒香干|油焖茭白|白灼秋葵|白灼西兰花|手撕包菜|蒜蓉空心菜|韭菜炒豆芽|芹菜炒腰果|油菜炒白玉菇|荷塘小炒|酱汁杏鲍菇|小白菜炒豆腐|彩椒炒双菇'.split('|'),

            '小炒荤菜': '红烧鸡翅|包菜炒牛肉|红烧带鱼|滑蛋虾仁|白灼鲜虾|黄花菜炒牛肉片|牛肉滑蛋|板栗烧鸡|香菇土豆焖鸡|豆苗炒牛肉|黄瓜炒虾仁|清蒸鲈鱼|藕片炒牛肉|鱿鱼炒荷兰豆|上汤娃娃菜|玉米笋炒虾仁|芹菜炒牛肉|莲藕炒牛肉|虾米炒丝瓜|虾仁玉子豆腐|彩椒炒牛肉|蒜苔炒牛肉|番茄汁牛肉片|蜜汁小鸡腿|双椒海鲜菇炒牛肉|番茄牛腩煲|鲍鱼香菇鸡|芦笋炒牛肉|番茄炒鸡蛋|牛肉末豆角|芦笋炒虾仁|口蘑炒鸡肉|葱烧鸡腿丁|木须鸡蛋|杏鲍菇炒牛肉丝|西芹牛肉片|茭白牛肉丝|牛肉沫炒豌豆'.split('|'),

            '蒸菜': '鸡腿肉蒸南瓜|番茄香菇蒸牛肉|豆芽蒸牛肉|牛肉卷蒸豆皮|牛肉沫蒸豆腐|牛肉珍珠丸|虾仁蒸南瓜|香菇蒸滑鸡|清蒸鲈鱼|花蛤蒸蛋|清蒸黄花鱼|虫草花蒸鸡|丝瓜蒸牛肉片|牛肉末蒸蛋|冬瓜蒸鸡|香菇蒸鲈鱼|牛肉蒸肉饼|丝瓜蒸鸡腿肉|鲫鱼片蒸蛋'.split('|'),

            '面食': '烧麦|饺子|吐司|花卷|鸡蛋饼|蔬菜饼|玉米饼|香蕉饼|南瓜饼|小笼包|蔬菜包|牛肉包|豆沙包|南瓜蒸糕|黑米紫薯糕|红糖发糕|芹菜牛肉饺|香菇鸡丝面|鱼丸清汤面|牛肉青菜面|虾仁菌菇面|番茄鸡蛋面|木耳丝丝面|萝卜丝煎蛋面|裙带菜虾仁面|鲫鱼豆腐汤面|玉米鸡肉馄饨|西葫芦虾仁馄饨'.split('|')
        };

        const recipes = Object.entries(menuGroups).flatMap(([category, names]) =>
            names.map((name, index) => ({
                id: `${category}-${index}`,
                name,
                category,
                icon: menuMeta[category].icon,
                desc: menuMeta[category].desc
            }))
        );

        let currentCategory = 'all';
        let isRolling = false;
        let history = [];

        const recipeCard = document.getElementById('recipeCard');
        const recipeIcon = document.getElementById('recipeIcon');
        const recipeName = document.getElementById('recipeName');
        const recipeCategory = document.getElementById('recipeCategory');
        const recipeDesc = document.getElementById('recipeDesc');
        const randomBtn = document.getElementById('randomBtn');

        // 分类筛选
        document.querySelectorAll('.filter-tag').forEach(tag => {
            tag.addEventListener('click', function () {
                document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentCategory = this.dataset.category;
            });
        });

        function getFilteredRecipes() {
            if (currentCategory === 'all') return recipes;
            return recipes.filter(r => r.category === currentCategory);
        }

        function startRandom() {
            if (isRolling) return;

            const filtered = getFilteredRecipes();
            if (filtered.length === 0) {
                alert('该分类下没有菜谱');
                return;
            }

            isRolling = true;
            randomBtn.disabled = true;
            randomBtn.textContent = '🎲 抽取中...';
            recipeCard.classList.add('rolling');
            recipeCategory.style.display = 'none';

            let count = 0;
            const maxCount = 20;
            const interval = setInterval(() => {
                const randomRecipe = filtered[Math.floor(Math.random() * filtered.length)];
                recipeIcon.textContent = randomRecipe.icon;
                recipeName.textContent = randomRecipe.name;
                recipeDesc.textContent = randomRecipe.desc;
                count++;

                if (count >= maxCount) {
                    clearInterval(interval);
                    finishRandom(filtered);
                }
            }, 100);
        }

        function finishRandom(filtered) {
            const finalRecipe = filtered[Math.floor(Math.random() * filtered.length)];

            recipeIcon.textContent = finalRecipe.icon;
            recipeName.textContent = finalRecipe.name;
            recipeCategory.textContent = finalRecipe.category;
            recipeCategory.style.display = 'inline-block';
            recipeDesc.textContent = finalRecipe.desc;

            recipeCard.classList.remove('rolling');
            recipeCard.style.transform = 'scale(1.05)';
            setTimeout(() => {
                recipeCard.style.transform = 'scale(1)';
            }, 200);

            createConfetti();
            // addToHistory(finalRecipe);

            isRolling = false;
            randomBtn.disabled = false;
            randomBtn.textContent = '🎲 再选一次';
        }

        function createConfetti() {
            const colors = ['#f093fb', '#f5576c', '#667eea', '#764ba2', '#ffd93d', '#6bcb77'];
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 50);
            }
        }

        function addToHistory(recipe) {
            history.unshift(recipe);
            if (history.length > 5) history.pop();

            const historySection = document.getElementById('historySection');
            const historyTags = document.getElementById('historyTags');

            historySection.style.display = 'block';
            historyTags.innerHTML = history.map(r =>
                `<span class="history-tag">${r.icon} ${r.name}</span>`
            ).join('');
        }

        function showRecipeList() {
            const modal = document.getElementById('recipeModal');
            const grid = document.getElementById('recipeGrid');

            grid.innerHTML = recipes.map((r, index) => `
                <div class="recipe-item" onclick="selectRecipe(${index})">
                    <div class="recipe-item-icon">${r.icon}</div>
                    <div class="recipe-item-name">${r.name}</div>
                    <div class="recipe-item-category">${r.category}</div>
                </div>
            `).join('');

            modal.classList.add('show');
        }

        function closeRecipeList() {
            document.getElementById('recipeModal').classList.remove('show');
        }

        function selectRecipe(index) {
            const recipe = recipes[index];
            if (recipe) {
                recipeIcon.textContent = recipe.icon;
                recipeName.textContent = recipe.name;
                recipeCategory.textContent = recipe.category;
                recipeCategory.style.display = 'inline-block';
                recipeDesc.textContent = recipe.desc;
                // addToHistory(recipe);
                closeRecipeList();
            }
        }

        // 点击模态框背景关闭
        document.getElementById('recipeModal').addEventListener('click', function (e) {
            if (e.target === this) closeRecipeList();
        });

        // 防止移动端双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>

</html>
